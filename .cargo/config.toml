[env]
Z3_SYS_Z3_HEADER = "/usr/include/z3.h"
Z3_LIBRARY_PATH_OVERRIDE = "/usr/lib"

# Uncomment for macOS (Homebrew):
# Z3_SYS_Z3_HEADER = "/opt/homebrew/include/z3.h"
# Z3_LIBRARY_PATH_OVERRIDE = "/opt/homebrew/lib"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[build]
# Limit parallel jobs to prevent OOM during test compilation
jobs = 4
# rustflags = "-Zthreads=8"

[profile.dev]
codegen-units = 32